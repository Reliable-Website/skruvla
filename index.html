<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Skruvlafestivalen</title>
    <link rel="icon" href="/Skruvla_Logo-Pos_1920.png" />
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #FF0000;
        overflow: hidden;
      }
      main {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      img {
        width: min(70vw, 70vh);
        height: auto;
        animation: float 4s ease-in-out infinite;
        will-change: transform;
      }
      @keyframes float {
        0%, 100% { transform: translateY(-2%) scale(1); }
        50%      { transform: translateY(2%) scale(1.02); }
      }
      @media (prefers-reduced-motion: reduce) {
        img { animation: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/Skruvla_Logo-Pos_1920.png" alt="Skruvlafestivalen" />
    </main>
  </body>
</html>
